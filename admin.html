<!DOCTYPE html>
<html lang="pt-br" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Bhaskara TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0c;
            color: white;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .mesh-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            z-index: -1;
        }

        input,
        textarea,
        select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="mesh-gradient"></div>

    <!-- Login Overlay -->
    <div id="login-overlay"
        class="fixed inset-0 z-[1000] bg-black/90 backdrop-blur-3xl flex items-center justify-center p-6">
        <div class="glass max-w-md w-full p-10 rounded-[3rem] text-center border-indigo-500/30">
            <div class="mb-8 font-black text-4xl">
                Bhaskara<span class="text-indigo-500">TV</span>
                <p class="text-[10px] opacity-40 uppercase tracking-[0.3em] mt-2">Painel de Controle</p>
            </div>

            <button id="login-google-btn"
                class="w-full py-4 px-6 bg-white text-black font-black rounded-2xl flex items-center justify-center gap-3 hover:bg-indigo-500 hover:text-white transition-all active:scale-95 shadow-xl shadow-white/5">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="currentColor"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="currentColor"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="currentColor"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.63l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Entrar com Google
            </button>
            <p id="auth-error" class="mt-4 text-red-500 text-xs font-bold hidden"></p>
        </div>
    </div>

    <!-- Main Content (Hidden until login) -->
    <div id="admin-content" class="max-w-7xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6 p-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter italic uppercase">Bhaskara<span
                        class="text-indigo-500">Admin</span></h1>
                <p class="opacity-40 text-sm font-bold uppercase tracking-widest">Gestão de Transmissão e Catálogo</p>
            </div>
            <div class="flex gap-4">
                <a href="index.html"
                    class="px-6 py-3 rounded-2xl glass hover:bg-white/10 transition-all text-sm font-bold flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                    Ver TV
                </a>
                <button id="logout-btn"
                    class="px-6 py-3 rounded-2xl glass border-red-500/20 text-red-400 hover:bg-red-500/10 transition-all text-sm font-bold">Sair</button>
                <button id="save-btn"
                    class="px-8 py-3 rounded-2xl bg-indigo-600 hover:bg-indigo-500 transition-all text-sm font-black uppercase tracking-widest shadow-xl shadow-indigo-600/20">Salvar
                    Nuvem</button>
            </div>
        </header>

        <div class="flex gap-2 border-b border-white/5 mb-8 overflow-x-auto px-4">
            <button id="tab-schedule"
                class="px-8 py-4 border-b-2 border-indigo-500 font-bold transition-all text-sm uppercase tracking-widest">Grade
                Linear</button>
            <button id="tab-catalog"
                class="px-8 py-4 border-b-2 border-transparent opacity-40 hover:opacity-100 font-bold transition-all text-sm uppercase tracking-widest">Catálogo</button>
        </div>

        <!-- SEÇÃO GRADE LINEAR -->
        <div id="section-schedule" class="grid grid-cols-1 lg:grid-cols-3 gap-8 p-4">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-[2.5rem] sticky top-8 border-indigo-500/10">
                    <h2 class="text-xl font-black mb-8 flex items-center gap-3 italic uppercase">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                        Novo Programa
                    </h2>
                    <form id="program-form" class="flex flex-col gap-6">
                        <div>
                            <label
                                class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Título
                                do Programa</label>
                            <input type="text" id="prog-title"
                                class="w-full p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all"
                                placeholder="Ex: Naruto EP 02" required>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="text-[10px] opacity-40 uppercase font-black tracking-[0.2em]">URL do Vídeo
                                    (MP4/HLS)</label>
                                <button type="button" id="btn-fetch-duration"
                                    class="text-[9px] bg-indigo-500/20 text-indigo-400 px-3 py-1 rounded-full font-black uppercase hover:bg-indigo-500 hover:text-white transition-all">Verificar
                                    Duração</button>
                            </div>
                            <input type="text" id="prog-url"
                                class="w-full p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all"
                                placeholder="Ex: https://..." required>
                        </div>
                        <!-- Hidden video for meta fetching -->
                        <video id="meta-fetcher" class="hidden" preload="metadata"></video>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Início
                                    (HH:MM)</label>
                                <input type="time" id="prog-start" class="w-full p-4 rounded-2xl outline-none" required>
                            </div>
                            <div>
                                <label
                                    class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Duração
                                    (Min)</label>
                                <input type="number" id="prog-duration" class="w-full p-4 rounded-2xl outline-none"
                                    placeholder="23" required>
                            </div>
                        </div>
                        <div>
                            <label
                                class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Descrição
                                / Sinopse</label>
                            <textarea id="prog-desc" class="w-full p-4 rounded-2xl outline-none glass min-h-[100px]"
                                placeholder="Breve resumo informativo..." required></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Dias
                                da Semana</label>
                            <div class="grid grid-cols-4 gap-2">
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="0" class="hidden"> <span
                                        class="text-[10px] font-black">DOM</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="1" class="hidden" checked> <span
                                        class="text-[10px] font-black">SEG</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="2" class="hidden" checked> <span
                                        class="text-[10px] font-black">TER</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="3" class="hidden" checked> <span
                                        class="text-[10px] font-black">QUA</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="4" class="hidden" checked> <span
                                        class="text-[10px] font-black">QUI</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="5" class="hidden" checked> <span
                                        class="text-[10px] font-black">SEX</span>
                                </label>
                                <label
                                    class="flex flex-col items-center glass p-3 rounded-2xl cursor-pointer hover:bg-white/5 has-[:checked]:bg-indigo-500/20 has-[:checked]:border-indigo-500 transition-all">
                                    <input type="checkbox" name="prog-days" value="6" class="hidden"> <span
                                        class="text-[10px] font-black">SAB</span>
                                </label>
                            </div>
                        </div>
                        <button type="submit"
                            class="w-full mt-4 p-5 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 font-black uppercase tracking-widest hover:bg-indigo-500 hover:text-white transition-all">Adicionar
                            à Grade</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div id="schedule-container" class="space-y-4">
                    <div class="p-20 text-center opacity-20 font-black uppercase tracking-[0.5em]">Carregando Nuvem...
                    </div>
                </div>
            </div>
        </div>

        <!-- SEÇÃO CATÁLOGO -->
        <div id="section-catalog" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8 p-4">
            <div class="lg:col-span-1">
                <div class="glass p-8 rounded-[2.5rem] sticky top-8 border-purple-500/10">
                    <h2 class="text-xl font-black mb-8 flex items-center gap-3 italic uppercase">
                        <span class="w-2 h-6 bg-purple-500 rounded-full"></span>
                        Catálogo VOD
                    </h2>
                    <form id="catalog-form" class="flex flex-col gap-6">
                        <div>
                            <label class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Nome
                                do Show</label>
                            <input type="text" id="cat-title"
                                class="w-full p-4 rounded-2xl outline-none focus:border-purple-500 transition-all"
                                placeholder="Ex: Pokémon" required>
                        </div>
                        <div>
                            <label
                                class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Categoria
                                / Tipo</label>
                            <input type="text" id="cat-type"
                                class="w-full p-4 rounded-2xl outline-none focus:border-purple-500 transition-all"
                                placeholder="Ex: Anime - Ação" required>
                        </div>
                        <div>
                            <label class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Capa
                                (URL da Imagem)</label>
                            <input type="text" id="cat-banner"
                                class="w-full p-4 rounded-2xl outline-none focus:border-purple-500 transition-all"
                                placeholder="Ex: https://..." required>
                        </div>
                        <div>
                            <label
                                class="text-[10px] opacity-40 block mb-2 uppercase font-black tracking-[0.2em]">Sinopse
                                Geral</label>
                            <textarea id="cat-desc" class="w-full p-4 rounded-2xl outline-none glass min-h-[100px]"
                                placeholder="Resumo do programa..." required></textarea>
                        </div>
                        <button type="submit"
                            class="w-full mt-4 p-5 rounded-2xl bg-purple-600/20 border border-purple-500/30 text-purple-400 font-black uppercase tracking-widest hover:bg-purple-600 hover:text-white transition-all">Adicionar
                            Destaque</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div id="catalog-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="p-20 text-center opacity-20 font-black uppercase tracking-[0.5em]">Carregando
                        Catálogo...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
